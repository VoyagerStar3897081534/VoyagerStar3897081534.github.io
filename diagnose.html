<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客页面诊断工具</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .check-item {
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }
        .check-item.pending {
            background: #fff3cd;
            border-left-color: #ffc107;
        }
        .check-item.success {
            background: #d4edda;
            border-left-color: #28a745;
        }
        .check-item.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        .check-item h3 {
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-icon {
            font-size: 24px;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .detail {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 博客页面诊断工具</h1>
        <p class="subtitle">自动检测博客页面无法显示文章的原因</p>

        <button onclick="runAllChecks()" style="font-size: 16px; padding: 15px 30px;">
            🚀 开始全面诊断
        </button>

        <div id="checks">
            <div class="check-item pending" id="check-server">
                <h3><span class="status-icon">⏳</span> 检查1: 服务器连接</h3>
                <p>正在等待检查...</p>
            </div>

            <div class="check-item pending" id="check-api">
                <h3><span class="status-icon">⏳</span> 检查2: API响应</h3>
                <p>正在等待检查...</p>
            </div>

            <div class="check-item pending" id="check-data">
                <h3><span class="status-icon">⏳</span> 检查3: 文章内容</h3>
                <p>正在等待检查...</p>
            </div>

            <div class="check-item pending" id="check-cors">
                <h3><span class="status-icon">⏳</span> 检查4: CORS配置</h3>
                <p>正在等待检查...</p>
            </div>
        </div>

        <div id="solution" style="margin-top: 30px; display: none;">
            <h2>💡 解决方案</h2>
            <div id="solution-content"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let checkResults = {};

        async function runAllChecks() {
            await checkServer();
            await checkAPI();
            await checkData();
            await checkCORS();
            showSolution();
        }

        async function checkServer() {
            const element = document.getElementById('check-server');
            try {
                const response = await fetch(API_BASE + '/posts', {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (response.ok) {
                    element.className = 'check-item success';
                    element.innerHTML = `
                        <h3><span class="status-icon">✅</span> 检查1: 服务器连接 - 通过</h3>
                        <p>服务器正常运行在 http://localhost:3000</p>
                        <div class="detail">状态码: ${response.status}</div>
                    `;
                    checkResults.server = true;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                element.className = 'check-item error';
                element.innerHTML = `
                    <h3><span class="status-icon">❌</span> 检查1: 服务器连接 - 失败</h3>
                    <p><strong>错误:</strong> ${error.message}</p>
                    <div class="detail">
                        <strong>可能原因:</strong><br>
                        1. 服务器未启动<br>
                        2. 端口不是3000<br>
                        3. 防火墙阻止连接
                    </div>
                    <button onclick="window.open('http://localhost:3000', '_blank')">测试访问服务器</button>
                `;
                checkResults.server = false;
            }
        }

        async function checkAPI() {
            const element = document.getElementById('check-api');
            try {
                const response = await fetch(API_BASE + '/posts');
                const data = await response.json();
                
                element.className = 'check-item success';
                element.innerHTML = `
                    <h3><span class="status-icon">✅</span> 检查2: API响应 - 通过</h3>
                    <p>API返回成功，获取到 ${data.data ? data.data.length : 0} 篇文章</p>
                    <div class="detail">
                        <strong>API响应:</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
                checkResults.api = true;
                checkResults.postCount = data.data ? data.data.length : 0;
            } catch (error) {
                element.className = 'check-item error';
                element.innerHTML = `
                    <h3><span class="status-icon">❌</span> 检查2: API响应 - 失败</h3>
                    <p><strong>错误:</strong> ${error.message}</p>
                    <div class="detail">
                        API无法正常响应，请检查服务器日志
                    </div>
                `;
                checkResults.api = false;
            }
        }

        async function checkData() {
            const element = document.getElementById('check-data');
            
            if (!checkResults.api) {
                element.className = 'check-item error';
                element.innerHTML = `
                    <h3><span class="status-icon">⚠️</span> 检查3: 文章内容 - 跳过</h3>
                    <p>由于API检查失败，无法继续检查文章内容</p>
                `;
                return;
            }

            if (checkResults.postCount === 0) {
                element.className = 'check-item error';
                element.innerHTML = `
                    <h3><span class="status-icon">⚠️</span> 检查3: 文章内容 - 无文章</h3>
                    <p><strong>数据库中没有文章！</strong></p>
                    <div class="detail">
                        <strong>解决方案:</strong><br>
                        1. 先登录管理员账号<br>
                        2. 点击"发帖"按钮<br>
                        3. 发布一篇测试文章<br>
                        <br>
                        <button onclick="window.location.href='login.html'">去登录</button>
                        <button onclick="window.location.href='post.html'">去发帖</button>
                    </div>
                `;
                checkResults.hasPosts = false;
            } else {
                element.className = 'check-item success';
                element.innerHTML = `
                    <h3><span class="status-icon">✅</span> 检查3: 文章内容 - 通过</h3>
                    <p>找到 ${checkResults.postCount} 篇文章</p>
                    <div class="detail">
                        文章数据正常，应该能在博客页面显示
                    </div>
                `;
                checkResults.hasPosts = true;
            }
        }

        async function checkCORS() {
            const element = document.getElementById('check-cors');
            
            if (!checkResults.server) {
                element.className = 'check-item error';
                element.innerHTML = `
                    <h3><span class="status-icon">⚠️</span> 检查4: CORS配置 - 跳过</h3>
                    <p>由于服务器连接失败，无法检查CORS配置</p>
                `;
                return;
            }

            element.className = 'check-item success';
            element.innerHTML = `
                <h3><span class="status-icon">✅</span> 检查4: CORS配置 - 通过</h3>
                <p>CORS配置正常，可以跨域访问</p>
                <div class="detail">
                    如果浏览器控制台有CORS错误，请检查server.js中是否启用了cors中间件
                </div>
            `;
        }

        function showSolution() {
            const solutionDiv = document.getElementById('solution');
            const contentDiv = document.getElementById('solution-content');
            
            let solutions = [];
            
            if (!checkResults.server) {
                solutions.push(`
                    <div class="check-item error">
                        <h3>🔧 问题1: 服务器未启动</h3>
                        <p><strong>解决方法:</strong></p>
                        <ol>
                            <li>打开命令行</li>
                            <li>进入项目目录: <code>cd E:\\VoyagerStar3897081534.github.io</code></li>
                            <li>运行: <code>npm start</code></li>
                            <li>看到"服务器运行在: http://localhost:3000"后，刷新本页面重新诊断</li>
                        </ol>
                    </div>
                `);
            }
            
            if (checkResults.server && !checkResults.api) {
                solutions.push(`
                    <div class="check-item error">
                        <h3>🔧 问题2: API无法响应</h3>
                        <p><strong>解决方法:</strong></p>
                        <ol>
                            <li>检查服务器命令行是否有错误信息</li>
                            <li>重启服务器: 按Ctrl+C停止，然后重新运行npm start</li>
                            <li>检查data/blog目录是否存在且有读取权限</li>
                        </ol>
                    </div>
                `);
            }
            
            if (checkResults.api && !checkResults.hasPosts) {
                solutions.push(`
                    <div class="check-item error">
                        <h3>🔧 问题3: 没有文章内容</h3>
                        <p><strong>解决方法:</strong></p>
                        <ol>
                            <li>访问 <a href="login.html" target="_blank">登录页面</a></li>
                            <li>输入密码: 123456</li>
                            <li>登录后点击"发帖"</li>
                            <li>发布一篇测试文章</li>
                            <li>返回博客页面查看</li>
                        </ol>
                    </div>
                `);
            }
            
            if (checkResults.server && checkResults.api && checkResults.hasPosts) {
                solutions.push(`
                    <div class="check-item success">
                        <h3>✅ 所有检查通过！</h3>
                        <p>系统运行正常，文章应该能正常显示。</p>
                        <p><strong>如果博客页面仍然不显示文章，请:</strong></p>
                        <ol>
                            <li>清除浏览器缓存: 按 Ctrl+Shift+Delete</li>
                            <li>强制刷新页面: 按 Ctrl+F5</li>
                            <li>检查浏览器控制台(F12)是否有JavaScript错误</li>
                            <li>尝试直接访问: <a href="blog.html" target="_blank">http://localhost:3000/blog.html</a></li>
                        </ol>
                    </div>
                `);
            }
            
            contentDiv.innerHTML = solutions.join('');
            solutionDiv.style.display = 'block';
        }
    </script>
</body>
</html>
