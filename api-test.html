<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试工具</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .test-section h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .result {
            margin-top: 10px;
            padding: 15px;
            background: white;
            border-radius: 5px;
            border: 1px solid #ddd;
            display: none;
        }
        .result.show {
            display: block;
        }
        .success {
            color: #28a745;
            font-weight: bold;
        }
        .error {
            color: #dc3545;
            font-weight: bold;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin-top: 10px;
        }
        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 5px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API测试工具</h1>
        <p>用于测试后端API是否正常工作</p>

        <div class="test-section">
            <h3>1. 测试服务器连接</h3>
            <button onclick="testServerConnection()">测试连接</button>
            <div id="result-connection" class="result"></div>
        </div>

        <div class="test-section">
            <h3>2. 测试登录API</h3>
            <input type="password" id="test-password" placeholder="输入密码" value="123456">
            <button onclick="testLogin()">测试登录</button>
            <div id="result-login" class="result"></div>
        </div>

        <div class="test-section">
            <h3>3. 测试获取文章列表</h3>
            <button onclick="testGetPosts()">获取文章列表</button>
            <div id="result-posts" class="result"></div>
        </div>

        <div class="test-section">
            <h3>4. 测试创建文章</h3>
            <input type="text" id="test-title" placeholder="文章标题" value="测试文章">
            <br>
            <textarea id="test-content" placeholder="文章内容" rows="4" style="width: 100%; margin: 5px 0; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">这是一篇测试文章，用于验证API功能。</textarea>
            <br>
            <button onclick="testCreatePost()">创建文章</button>
            <div id="result-create" class="result"></div>
        </div>

        <div class="test-section">
            <h3>5. 快速导航</h3>
            <button onclick="window.open('http://localhost:3000', '_blank')">打开首页</button>
            <button onclick="window.open('http://localhost:3000/login.html', '_blank')">登录页面</button>
            <button onclick="window.open('http://localhost:3000/blog.html', '_blank')">博客列表</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        function showResult(elementId, success, message, data = null) {
            const element = document.getElementById(elementId);
            element.className = 'result show';
            element.innerHTML = `
                <div class="${success ? 'success' : 'error'}">${success ? '✓' : '✗'} ${message}</div>
                ${data ? '<pre>' + JSON.stringify(data, null, 2) + '</pre>' : ''}
            `;
        }

        async function testServerConnection() {
            try {
                const response = await fetch(API_BASE + '/posts');
                if (response.ok) {
                    showResult('result-connection', true, '服务器连接成功！');
                } else {
                    showResult('result-connection', false, '服务器响应错误: ' + response.status);
                }
            } catch (error) {
                showResult('result-connection', false, '无法连接到服务器，请确保已运行 npm start');
            }
        }

        async function testLogin() {
            const password = document.getElementById('test-password').value;
            try {
                const response = await fetch(API_BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                showResult('result-login', data.success, data.message, data);
            } catch (error) {
                showResult('result-login', false, '请求失败: ' + error.message);
            }
        }

        async function testGetPosts() {
            try {
                const response = await fetch(API_BASE + '/posts');
                const data = await response.json();
                showResult('result-posts', data.success, 
                    `获取到 ${data.data ? data.data.length : 0} 篇文章`, 
                    data);
            } catch (error) {
                showResult('result-posts', false, '请求失败: ' + error.message);
            }
        }

        async function testCreatePost() {
            const title = document.getElementById('test-title').value;
            const content = document.getElementById('test-content').value;
            
            if (!title || !content) {
                showResult('result-create', false, '标题和内容不能为空');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
                const data = await response.json();
                showResult('result-create', data.success, data.message, data);
            } catch (error) {
                showResult('result-create', false, '请求失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
