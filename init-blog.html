<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化博客数据</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.3s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 博客系统初始化</h1>
        <p>点击下面的按钮来初始化示例博客数据：</p>
        
        <button class="button" onclick="initSampleData()">初始化示例数据</button>
        <button class="button" onclick="clearData()">清除所有数据</button>
        <button class="button" onclick="window.location.href='index.html'">返回首页</button>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        function initSampleData() {
            const messageDiv = document.getElementById('message');
            
            // 创建示例文章
            const samplePosts = [
                {
                    title: "欢迎来到VoyagerStar的博客",
                    content: "这是我的第一篇博客文章！\n\n在这个博客中，我将分享我的想法、经验和创意。感谢你的访问！\n\n如果你有任何问题或建议，欢迎通过联系页面与我取得联系。",
                    timestamp: 1714118400000,
                    date: "2026-04-26T03:00:00.000Z",
                    formattedDate: "2026/04/26 11:00:00"
                },
                {
                    title: "如何使用本博客系统",
                    content: "1. 首先点击导航栏的\"登录\"按钮\n2. 输入密码：123456\n3. 登录后，你可以点击\"发帖\"按钮发布新文章\n4. 在\"博客\"页面可以查看所有文章\n\n祝你使用愉快！",
                    timestamp: 1714122000000,
                    date: "2026-04-26T04:00:00.000Z",
                    formattedDate: "2026/04/26 12:00:00"
                }
            ];
            
            // 保存到localStorage
            localStorage.setItem('blogPosts', JSON.stringify(samplePosts));
            
            messageDiv.className = 'message success';
            messageDiv.innerHTML = `
                <strong>✓ 初始化成功！</strong><br>
                已创建 ${samplePosts.length} 篇示例文章。<br>
                <a href="blog.html" style="color: #155724; text-decoration: underline;">点击查看博客</a>
            `;
        }
        
        function clearData() {
            const messageDiv = document.getElementById('message');
            
            // 清除所有博客数据
            localStorage.removeItem('blogPosts');
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('loginTime');
            
            messageDiv.className = 'message info';
            messageDiv.innerHTML = `
                <strong>ℹ 数据已清除</strong><br>
                所有博客文章和登录状态已被清除。
            `;
        }
    </script>
</body>
</html>
