# GitHub Actions 工作流：通过 SSH 部署到生产服务器
# 此工作流需要配置 GitHub Secrets:
# - SSH_HOST: 生产服务器地址
# - SSH_USERNAME: SSH 用户名
# - SSH_KEY: SSH 私钥
# - SSH_PORT: SSH 端口（可选，默认 22）

name: Deploy to Production Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Deploy via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        source: "."
        target: "/path/to/your/app"
        strip_components: 0
        
    - name: Restart application on server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          cd /path/to/your/app
          npm install --production
          pm2 restart voyagerstar-blog || pm2 start ecosystem.config.js
          pm2 save
